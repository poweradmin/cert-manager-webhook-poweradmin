groupName: acme.yourdomain.com

replicaCount: 1

certManager:
  namespace: cert-manager
  serviceAccountName: cert-manager

rbac:
  secretReader:
    # Namespaces (besides certManager.namespace, which covers ClusterIssuers)
    # where the webhook may read API-key Secrets. Add entries here when
    # namespaced Issuers reference Secrets in other namespaces.
    additionalNamespaces: []
    # Optionally restrict which Secrets can be read, by name.
    secretNames: []
    # Restore the pre-0.2 cluster-wide secret access (not recommended).
    clusterScope: false

image:
  repository: ghcr.io/poweradmin/cert-manager-webhook-poweradmin
  tag: latest
  pullPolicy: IfNotPresent

nameOverride: ""
fullnameOverride: ""

service:
  type: ClusterIP
  port: 443

podSecurityContext:
  runAsNonRoot: true
  runAsUser: 65532
  runAsGroup: 65532
  fsGroup: 65532
  seccompProfile:
    type: RuntimeDefault

securityContext:
  allowPrivilegeEscalation: false
  readOnlyRootFilesystem: true
  capabilities:
    drop:
      - ALL

livenessProbe:
  httpGet:
    scheme: HTTPS
    path: /healthz
    port: https
  initialDelaySeconds: 5
  periodSeconds: 10
  timeoutSeconds: 5
  failureThreshold: 3

readinessProbe:
  httpGet:
    scheme: HTTPS
    path: /healthz
    port: https
  initialDelaySeconds: 5
  periodSeconds: 10
  timeoutSeconds: 5
  failureThreshold: 3

resources:
  requests:
    cpu: 50m
    memory: 64Mi
  limits:
    cpu: 100m
    memory: 128Mi

nodeSelector: {}

tolerations: []

affinity: {}
