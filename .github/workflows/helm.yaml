---
name: Helm

on:
  push:
    paths:
      - "deploy/**"
  pull_request:
    branches:
      - main
    paths:
      - "deploy/**"

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

permissions:
  contents: read

jobs:
  lint:
    name: Lint
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Setup Helm
        uses: azure/setup-helm@dda3372f752e03dde6b3237bc9431cdc2f7a02a2 # v5

      - name: Lint chart
        run: helm lint deploy/cert-manager-webhook-poweradmin

      - name: Template chart
        run: |
          helm template cert-manager-webhook-poweradmin deploy/cert-manager-webhook-poweradmin \
            --set groupName=acme.example.com
