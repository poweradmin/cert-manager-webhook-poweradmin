---
name: Helm

on:
  push:
    paths:
      - "deploy/**"
  pull_request:
    branches:
      - main
    paths:
      - "deploy/**"

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

permissions:
  contents: read

jobs:
  lint:
    name: Lint
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6

      - name: Setup Helm
        uses: azure/setup-helm@9bc31f4ebc9c6b171d7bfbaa5d006ae7abdb4310 # v5

      - name: Lint chart
        run: helm lint deploy/cert-manager-webhook-poweradmin

      - name: Template chart
        run: |
          helm template cert-manager-webhook-poweradmin deploy/cert-manager-webhook-poweradmin \
            --set groupName=acme.example.com
